<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - Nội Y Buôn Hồ</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Manrope:wght@300;400;600;800&display=swap" rel="stylesheet">

  <!-- Icon -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

  <style>
    body {
      font-family: 'Manrope', sans-serif;
      background-color: #faf9f6;
      color: #303330;
    }

    .serif-display {
      font-family: 'Noto Serif', serif;
    }

    .login-container {
      max-width: 420px;
      margin: auto;
    }

    .hero-img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      border-radius: 16px;
    }

    .form-control {
      border-radius: 50px;
      padding: 14px 20px;
      background-color: #f5f2fb;
      border: none;
    }

    .form-control:focus {
      box-shadow: 0 0 0 2px rgba(88, 91, 140, 0.2);
    }

    .input-icon {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: #999;
    }

    .btn-silk {
      background: #7d5731;
      color: white;
      border-radius: 50px;
      padding: 14px;
      letter-spacing: 2px;
      font-weight: bold;
    }

    .btn-silk:hover {
      opacity: 0.9;
    }

    .material-symbols-outlined {
      font-size: 20px;
      vertical-align: middle;
    }
  </style>
</head>

<body class="d-flex flex-column align-items-center">

  <!-- Header -->
  <header class="py-4 text-center">
    <h1 class="text-uppercase" style="letter-spacing:4px;"></h1>
  </header>

  <main class="login-container px-3">

    <!-- Image -->
    <div class="mb-4">
      <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuCVC7xzTg80hJebS5wsXBeRt-IH_yBeC6lrNnzJTlVhPjlqzQI1rXoyn5Mdel7-3Fg4_Aa4ls5A9CUCwb7cOl2A2onsXAGIjodr3i1vE4MxBKv88r1G_HbSRiw0FLm4rUQSQAcEkmxdUE4PomUet-P7IKtOF4pqluCl8dLYdC9DKqlOF1tWHngxg5T6yF6CawYktczQTecMsm_7phNW4AUOV2cwJWA_QsC0WdBJzAzNJH2UbsO3JZoJvlPphPNkBzfN2nQqdDDr8USm"
           class="hero-img">
    </div>

    <!-- Title -->
    <div class="text-center mb-4">
      <h2 class="serif-display">Đăng nhập</h2>
      <p class="text-muted small">Chào mừng bạn đến với Nội Y Buôn Hồ</p>
    </div>

    <!-- Form -->
    <form>

      <!-- Phone -->
      <div class="mb-3 position-relative">
        <label class="form-label small fw-bold text-uppercase">Số điện thoại</label>
        <input type="tel" class="form-control" placeholder="090 123 4567">
        <span class="material-symbols-outlined input-icon">call</span>
      </div>

      <!-- Password -->
      <div class="mb-3 position-relative">
        <label class="form-label small fw-bold text-uppercase">Mật khẩu</label>
        <input type="password" class="form-control" placeholder="••••••••">
        <span class="material-symbols-outlined input-icon">lock</span>
      </div>

      <!-- Forgot -->
      <div class="text-center mb-3">
        <a href="#" class="small text-muted">Quên mật khẩu?</a>
      </div>

      <!-- Button -->
      <button class="btn btn-silk w-100">Đăng nhập</button>

    </form>

    <!-- Register -->
    <div class="text-center mt-4 mb-5">
      <p class="small text-muted">Chưa có tài khoản?</p>
      <a href="#" class="fw-semibold text-dark text-decoration-none border-bottom">
        Tạo tài khoản mới
      </a>
    </div>

  </main>

</body>
</html>
